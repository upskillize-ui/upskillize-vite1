<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upskillize FinTech & AI Innovation Lab — 3D Experience</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Sora:wght@300;400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;color:#e0e8f0;font-family:'Sora',sans-serif;overflow:hidden;height:100vh;width:100vw}
#c{width:100%;height:100%;position:relative}
canvas{display:block}

.hud{position:absolute;top:0;left:0;right:0;padding:14px 20px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10}
.brand{display:flex;align-items:center;gap:10px}
.logo-mark{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#00ffc8,#00a5ff);display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-weight:900;font-size:20px;color:#050510;box-shadow:0 0 25px rgba(0,255,200,0.4)}
.brand-text .brand-name{font-family:'Orbitron';font-size:18px;font-weight:700;color:#fff;letter-spacing:2px}
.brand-text .brand-sub{font-size:10px;color:#00ffc8;letter-spacing:3px;font-weight:500;text-transform:uppercase;margin-top:0}

.stats{display:flex;gap:10px;pointer-events:auto}
.st{background:rgba(0,20,40,0.7);border:1px solid rgba(0,255,200,0.12);border-radius:10px;padding:8px 16px;text-align:center;backdrop-filter:blur(20px)}
.st .v{font-family:'Orbitron';font-size:20px;font-weight:700;color:#00ffc8;text-shadow:0 0 12px rgba(0,255,200,0.4)}
.st .l{font-size:8px;letter-spacing:2.5px;color:#5a7a9a;text-transform:uppercase;margin-top:2px}

.zone-nav{position:absolute;bottom:14px;left:14px;right:14px;display:flex;gap:6px;overflow-x:auto;padding:6px 0;pointer-events:auto;z-index:10;-webkit-overflow-scrolling:touch}
.zone-nav::-webkit-scrollbar{height:3px}
.zone-nav::-webkit-scrollbar-thumb{background:rgba(0,255,200,0.3);border-radius:2px}
.zc{flex-shrink:0;background:rgba(5,10,25,0.8);border:1px solid rgba(0,255,200,0.08);border-radius:10px;padding:10px 14px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(15px);min-width:130px}
.zc:hover,.zc.on{border-color:#00ffc8;background:rgba(0,255,200,0.06);transform:translateY(-3px);box-shadow:0 6px 25px rgba(0,255,200,0.12)}
.zc .zn{font-family:'Orbitron';font-size:8px;font-weight:600;color:#00ffc8;letter-spacing:1.5px;text-transform:uppercase}
.zc .zd{font-size:10px;color:#6a8aaa;line-height:1.3;margin-top:3px}
.zc .zs{font-family:'Share Tech Mono';font-size:9px;color:#ff6b9d;margin-top:3px}

.ctrls{position:absolute;top:50%;right:14px;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;pointer-events:auto;z-index:10}
.cb{width:38px;height:38px;border-radius:10px;background:rgba(5,10,25,0.8);border:1px solid rgba(0,255,200,0.15);color:#00ffc8;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;backdrop-filter:blur(10px);font-family:'Share Tech Mono'}
.cb:hover{background:rgba(0,255,200,0.12);border-color:#00ffc8;box-shadow:0 0 20px rgba(0,255,200,0.2)}

.legend{position:absolute;top:74px;left:20px;pointer-events:none;z-index:10;display:flex;flex-direction:column;gap:4px}
.li{display:flex;align-items:center;gap:7px;font-size:9px;color:#5a7a9a;letter-spacing:1.5px;text-transform:uppercase}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}

.info-tag{position:absolute;bottom:72px;right:20px;font-family:'Orbitron';font-size:7px;letter-spacing:3px;color:rgba(0,255,200,0.2);text-transform:uppercase;pointer-events:none;z-index:10;text-align:right;line-height:1.6}

/* Overlay labels */
.float-label{position:absolute;pointer-events:none;z-index:5;font-family:'Orbitron';font-weight:600;letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 15px currentColor;transition:opacity .3s}
</style>

    if(seated) {
      // SEATED PERSON
      // Torso (seated upright)
      const torso = new THREE.Mesh(
        new THREE.BoxGeometry(.3,.35,.2),
        new THREE.MeshStandardMaterial({color:shirt, roughness:.7})
      );
      torso.position.y = .62;
      g.add(torso);

      // Head
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(.1, 12, 12),
        new THREE.MeshStandardMaterial({color:skin, roughness:.8})
      );
      head.position.y = .9;
      g.add(head);

      // Hair
      const hair = new THREE.Mesh(
        new THREE.SphereGeometry(.105, 12, 8, 0, Math.PI*2, 0, Math.PI/2),
        new THREE.MeshStandardMaterial({color:0x1a1a2a, roughness:.9})
      );
      hair.position.y = .92;
      g.add(hair);

      // Upper arms
      [-.2, .2].forEach(side=>{
        const arm = new THREE.Mesh(
          new THREE.CylinderGeometry(.04,.035,.25,6),
          new THREE.MeshStandardMaterial({color:shirt, roughness:.7})
        );
        arm.position.set(side, .58, 0);
        arm.rotation.z = side>0?.15:-.15;
        g.add(arm);
      });

      // Forearms on desk
      [-.18, .18].forEach(side=>{
        const forearm = new THREE.Mesh(
          new THREE.CylinderGeometry(.03,.03,.2,6),
          new THREE.MeshStandardMaterial({color:skin, roughness:.8})
        );
        forearm.position.set(side, .46, -.15);
        forearm.rotation.x = -Math.PI/2.5;
        g.add(forearm);
      });

      // Upper legs
      [-.08, .08].forEach(side=>{
        const leg = new THREE.Mesh(
          new THREE.CylinderGeometry(.05,.045,.35,6),
          new THREE.MeshStandardMaterial({color:0x1e293b, roughness:.6})
        );
        leg.position.set(side, .42, .05);
        leg.rotation.x = Math.PI/2.2;
        g.add(leg);
      });

    } else {
      // STANDING PERSON (mentor observing, facilitator)
      // Full body standing
      // Legs
      [-.07, .07].forEach(side=>{
        const leg = new THREE.Mesh(
          new THREE.CylinderGeometry(.045,.04,.5,6),
          new THREE.MeshStandardMaterial({color:0x1e293b, roughness:.6})
        );
        leg.position.set(side, .25, 0);
        g.add(leg);
      });

      // Torso
      const torso = new THREE.Mesh(
        new THREE.BoxGeometry(.32,.4,.2),
        new THREE.MeshStandardMaterial({color:shirt, roughness:.6})
      );
      torso.position.y = .7;
      g.add(torso);

      // Head
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(.1, 12, 12),
        new THREE.MeshStandardMaterial({color:skin, roughness:.8})
      );
      head.position.y = 1.02;
      g.add(head);

      // Hair
      const hair = new THREE.Mesh(
        new THREE.SphereGeometry(.105, 12, 8, 0, Math.PI*2, 0, Math.PI/2),
        new THREE.MeshStandardMaterial({color:0x1a1a2a, roughness:.9})
      );
      hair.position.y = 1.04;
      g.add(hair);

      // Arms at sides or pointing
      [-.2, .2].forEach((side,idx)=>{
        const arm = new THREE.Mesh(
          new THREE.CylinderGeometry(.035,.03,.35,6),
          new THREE.MeshStandardMaterial({color:type==='mentor'?shirt:skin, roughness:.7})
        );
        arm.position.set(side, .55, 0);
        if(type==='mentor' && idx===1) {
          arm.rotation.z = .8; // Pointing/gesturing
          arm.rotation.x = -.3;
        } else {
          arm.rotation.z = side>0?.08:-.08;
        }
        g.add(arm);
      });
    }

    // Type badge (floating above head)
    const badgeY = seated?.98:1.15;
    const badge = makeTypeBadge(type);
    badge.position.y = badgeY + .12;
    g.add(badge);

    g.position.set(x, 0, z);
    g.rotation.y = lookDir;
    scene.add(g);
    people.push(g);
    return g;
  }

  function makeTypeBadge(type) {
    const canvas = document.createElement('canvas');
    canvas.width=64; canvas.height=64;
    const ctx = canvas.getContext('2d');
    const colors = {student:'#00e676', mentor:'#ff6b9d', facilitator:'#aa66ff'};
    const labels = {student:'S', mentor:'M', facilitator:'F'};
    ctx.beginPath(); ctx.arc(32,32,28,0,Math.PI*2);
    ctx.fillStyle = colors[type]; ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(labels[type], 32, 33);

    const tex = new THREE.CanvasTexture(canvas);
    const m = new THREE.Mesh(
      new THREE.PlaneGeometry(.22,.22),
      new THREE.MeshBasicMaterial({map:tex, transparent:true, side:THREE.DoubleSide, depthWrite:false})
    );
    return m;
  }

  // === PLACE ALL STUDENTS (seated at workstations) ===
  // Pair 06 - ESG (4 students)
  for(let i=0;i<4;i++) makePerson(-7.5+i*1.4, 5.65, 'student', true, Math.PI);
  // Pair 07+08 (6 students)
  for(let i=0;i<6;i++) makePerson(-3.5+i*1.4, 5.65, 'student', true, Math.PI);
  // Pair 09 (4 students)
  for(let i=0;i<4;i++) makePerson(5+i*1.4, 5.65, 'student', true, Math.PI);
  // Pair 01 (2 students)
  for(let i=0;i<2;i++) makePerson(-4.5+i*1.5, -6.65, 'student', true, 0);
  // Pair 02 (2 students)
  for(let i=0;i<2;i++) makePerson(6.5+i*1.5, -6.65, 'student', true, 0);
  // Pair 10 - Trading (2 students)
  for(let i=0;i<2;i++) makePerson(-9.35, -1+i*2, 'student', true, -Math.PI/2);

  // === MENTORS (standing, observing students) ===
  // Mentor behind Pair 06
  makePerson(-6.5, 6.8, 'mentor', false, Math.PI);
  // Mentor behind Pair 07+08
  makePerson(1, 6.8, 'mentor', false, Math.PI);
  // Mentor at mentor area (seated)
  makePerson(8.35, -1, 'mentor', true, -Math.PI/2);
  makePerson(8.35, 1, 'mentor', true, -Math.PI/2);

  // === FACILITATOR (standing at capstone / station) ===
  makePerson(0, 1.2, 'facilitator', false, Math.PI);

  // === STANDUP ZONE - Students standing ===
  // A few students standing in standup circle
  makePerson(-8.5, -5, 'student', false, Math.PI/4);
  makePerson(-7.5, -5.8, 'student', false, Math.PI/6);
  makePerson(-6.5, -5, 'student', false, -Math.PI/4);
}

// ═══ BRANDING ═══
function buildBranding() {
  // Upskillize logo on back wall (large)
  const logoTxt = makeBrandLabel('UPSKILLIZE', 0x00ffc8, 2.2);
  logoTxt.position.set(6.5, 3.6, -8.8);
  scene.add(logoTxt);

  // Tagline
  const tag = makeLabel('Bridging Academia & Industry', 0x5a8aaa, .8);
  tag.position.set(6.5, 3.15, -8.8);
  scene.add(tag);

  // Open Innovation Floor label on floor
  const floorLabel = makeFloorLabel('OPEN INNOVATION FLOOR', 0x00ffc8);
  floorLabel.position.set(0, .02, 0);
  floorLabel.rotation.x = -Math.PI/2;
  scene.add(floorLabel);

  // Floor subtitle
  const floorSub = makeFloorLabel('~380 sq ft · walk · present · sprint · discuss', 0x3a5a7a, 18);
  floorSub.position.set(0, .02, .8);
  floorSub.rotation.x = -Math.PI/2;
  scene.add(floorSub);

  // Capstone label
  const capLabel = makeLabel('🎤 CAPSTONE PITCH', 0xaa66ff, .8);
  capLabel.position.set(0, .5, 2.8);
  scene.add(capLabel);

  // Zone labels on floor
  const floorLabels = [
    {text:'PAIR 06 · ESG', x:-6.5, z:7, c:0x00e676},
    {text:'PAIR 07+08 · M&A · INSURTECH', x:0, z:7, c:0xff6b9d},
    {text:'PAIR 09 · LENDING TECH', x:6.5, z:7, c:0xffeb3b},
    {text:'STANDUP ZONE', x:-7.5, z:-3.8, c:0x40c4ff},
    {text:'MENTOR SESSIONS', x:9, z:-2.5, c:0xff6b9d},
    {text:'LEARNING LOUNGE', x:8, z:6.8, c:0x7c4dff},
    {text:'PAIR 10 · TRADING', x:-10.5, z:2, c:0x40c4ff},
  ];
  floorLabels.forEach(fl=>{
    const lb = makeLabel(fl.text, fl.c, .5);
    lb.position.set(fl.x, .06, fl.z);
    lb.rotation.x = -Math.PI/2;
    scene.add(lb);
  });

  // Room dimension label
  const dimLb = makeLabel('~1,200 sq ft · 10 Zones · ~24m × 24m', 0x2a3a5a, .6);
  dimLb.position.set(0, .02, 8.5);
  dimLb.rotation.x = -Math.PI/2;
  scene.add(dimLb);

  // "FACILITATOR: UPSKILLIZE" on wall
  const facWall = makeLabel('FACILITATOR: UPSKILLIZE', 0xaa66ff, .7);
  facWall.position.set(0, 3.6, -8.8);
  scene.add(facWall);

  // Fintech Sprint Map label
  const sprintLabel = makeLabel('Fintech Sprint Map · 22 active tickets', 0xffab40, .65);
  sprintLabel.position.set(0, .06, -4.2);
  sprintLabel.rotation.x = -Math.PI/2;
  scene.add(sprintLabel);

  const sprintDetail = makeLabel('Backlog: 8 · In Sprint: 9 · Review: 3 · Done: 2', 0x4a6a8a, .55);
  sprintDetail.position.set(0, .06, -3.5);
  sprintDetail.rotation.x = -Math.PI/2;
  scene.add(sprintDetail);
}

function makeLabel(text, color, scale=1) {
  const canvas = document.createElement('canvas');
  canvas.width=1024; canvas.height=128;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,1024,128);
  ctx.fillStyle = '#'+color.toString(16).padStart(6,'0');
  ctx.font = 'bold 36px Orbitron, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 512, 64);
  const tex = new THREE.CanvasTexture(canvas);
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(scale*5, scale*.6),
    new THREE.MeshBasicMaterial({map:tex, transparent:true, side:THREE.DoubleSide, depthWrite:false})
  );
  return m;
}

function makeBrandLabel(text, color, scale=1) {
  const canvas = document.createElement('canvas');
  canvas.width=1024; canvas.height=192;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,1024,192);
  // Glow effect
  ctx.shadowColor = '#'+color.toString(16).padStart(6,'0');
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#'+color.toString(16).padStart(6,'0');
  ctx.font = 'bold 72px Orbitron, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 512, 96);
  const tex = new THREE.CanvasTexture(canvas);
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(scale*3, scale*.55),
    new THREE.MeshBasicMaterial({map:tex, transparent:true, side:THREE.DoubleSide, depthWrite:false})
  );
  return m;
}

function makeFloorLabel(text, color, fontSize=28) {
  const canvas = document.createElement('canvas');
  canvas.width=2048; canvas.height=256;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,2048,256);
  ctx.shadowColor = '#'+color.toString(16).padStart(6,'0');
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#'+color.toString(16).padStart(6,'0');
  ctx.font = `bold ${fontSize*2}px Orbitron, monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 1024, 128);
  const tex = new THREE.CanvasTexture(canvas);
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(8, 1),
    new THREE.MeshBasicMaterial({map:tex, transparent:true, side:THREE.DoubleSide, depthWrite:false})
  );
  return m;
}

// ═══ ZONE UI ═══
function buildZoneUI() {
  const panel = document.getElementById('zp');
  ZONES.forEach((z,i)=>{
    const c = document.createElement('div');
    c.className='zc';
    c.innerHTML=`<div class="zn">${z.name}</div><div class="zd">${z.desc}</div><div class="zs">${z.seats}</div>`;
    c.onclick=()=>focusZone(i);
    panel.appendChild(c);
  });
}

function focusZone(i) {
  const z = ZONES[i];
  tA = Math.atan2(z.x+.1, z.z+10)+Math.PI;
  tD = 14;
  tE = .45;
  autoRotate = false;
  document.querySelectorAll('.zc').forEach((c,j)=>c.classList.toggle('on',j===i));
  zoneMeshes.forEach((m,j)=>{
    m.material.opacity = j===i?.2:.08;
    m.material.emissiveIntensity = j===i?.15:.05;
  });
}

// ═══ CAMERA ═══
function updateCam() {
  const x = Math.sin(camA)*Math.cos(camE)*camD;
  const y = Math.sin(camE)*camD;
  const z = Math.cos(camA)*Math.cos(camE)*camD;
  camera.position.set(x, Math.max(y,1.5), z);
  camera.lookAt(0,.8,0);
}

function resetCam(){ tA=.45; tE=.55; tD=28; autoRotate=true;
  document.querySelectorAll('.zc').forEach(c=>c.classList.remove('on'));
  zoneMeshes.forEach(m=>{m.material.opacity=.08;m.material.emissiveIntensity=.05;});
}
function topV(){ tA=0; tE=1.45; tD=20; autoRotate=false; }
function walkV(){ tA=.3; tE=.15; tD=14; autoRotate=false; }
function toggleRot(){ autoRotate=!autoRotate; }

function setupControls() {
  const cv = renderer.domElement;
  cv.addEventListener('mousedown',e=>{ isDrag=true; autoRotate=false; prev={x:e.clientX,y:e.clientY}; });
  cv.addEventListener('mousemove',e=>{
    if(!isDrag) return;
    tA -= (e.clientX-prev.x)*.005;
    tE = Math.max(.05,Math.min(1.5,tE+(e.clientY-prev.y)*.005));
    prev={x:e.clientX,y:e.clientY};
  });
  cv.addEventListener('mouseup',()=>isDrag=false);
  cv.addEventListener('mouseleave',()=>isDrag=false);
  cv.addEventListener('wheel',e=>{e.preventDefault();tD=Math.max(6,Math.min(40,tD+e.deltaY*.02));},{passive:false});

  let lastTD=0;
  cv.addEventListener('touchstart',e=>{
    if(e.touches.length===1){isDrag=true;autoRotate=false;prev={x:e.touches[0].clientX,y:e.touches[0].clientY};}
    else if(e.touches.length===2){lastTD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  });
  cv.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1&&isDrag){
      tA-=(e.touches[0].clientX-prev.x)*.005;
      tE=Math.max(.05,Math.min(1.5,tE+(e.touches[0].clientY-prev.y)*.005));
      prev={x:e.touches[0].clientX,y:e.touches[0].clientY};
    } else if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      tD=Math.max(6,Math.min(40,tD-(d-lastTD)*.05));lastTD=d;
    }
  },{passive:false});
  cv.addEventListener('touchend',()=>isDrag=false);

  window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
}

// ═══ ANIMATE ═══
function animate() {
  requestAnimationFrame(animate);
  t += .008;

  if(autoRotate) tA += .0015;
  camA += (tA-camA)*.04;
  camE += (tE-camE)*.04;
  camD += (tD-camD)*.04;
  updateCam();

  // People breathing / idle animation
  people.forEach((p,i)=>{
    // Gentle breathing
    const breathe = Math.sin(t*2+i*.7)*.005;
    p.children.forEach(child=>{
      if(child.position.y > .5) child.position.y += breathe;
    });
    // Badge always faces camera
    const badge = p.children[p.children.length-1];
    if(badge && badge.material && badge.material.map) {
      badge.lookAt(camera.position);
    }
  });

  // Laptop screen flicker
  laptopScreens.forEach((s,i)=>{
    const flick = .6 + Math.sin(t*4+i*1.3)*.15;
    s.material.emissiveIntensity = flick;
  });

  // Zone pulse
  zoneMeshes.forEach((m,i)=>{
    if(m.material.opacity < .15) {
      m.material.emissiveIntensity = .03 + Math.sin(t*2+i)*.02;
    }
  });

  renderer.render(scene, camera);
}

init();
</script>
