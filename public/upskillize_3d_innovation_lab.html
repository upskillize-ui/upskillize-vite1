<head>
<meta charset="UTF-8">

<title>Upskillize FinTech & AI Innovation Lab — 3D Open View</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Sora:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060610;color:#e0e8f0;font-family:'Sora',sans-serif;overflow:hidden;height:100vh;width:100vw}
#c{width:100%;height:100%;position:relative}
canvas{display:block}

.hud{position:absolute;top:0;left:0;right:0;padding:12px 18px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10}
.brand{display:flex;align-items:center;gap:10px}
.logo-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#00ffc8,#00a5ff);display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-weight:900;font-size:18px;color:#050510;box-shadow:0 0 20px rgba(0,255,200,0.4)}
.brand-text .bn{font-family:'Orbitron';font-size:16px;font-weight:700;color:#fff;letter-spacing:2px}
.brand-text .bs{font-size:9px;color:#00ffc8;letter-spacing:3px;font-weight:500;text-transform:uppercase;margin-top:1px}

.stats{display:flex;gap:8px;pointer-events:auto}
.st{background:rgba(0,20,40,0.75);border:1px solid rgba(0,255,200,0.12);border-radius:8px;padding:6px 14px;text-align:center;backdrop-filter:blur(15px)}
.st .v{font-family:'Orbitron';font-size:17px;font-weight:700;color:#00ffc8;text-shadow:0 0 10px rgba(0,255,200,0.3)}
.st .l{font-size:7px;letter-spacing:2px;color:#5a7a9a;text-transform:uppercase;margin-top:2px}

.zp{position:absolute;bottom:12px;left:12px;right:12px;display:flex;gap:5px;overflow-x:auto;padding:5px 0;pointer-events:auto;z-index:10}
.zp::-webkit-scrollbar{height:2px}
.zp::-webkit-scrollbar-thumb{background:rgba(0,255,200,0.3);border-radius:2px}
.zc{flex-shrink:0;background:rgba(5,10,25,0.85);border:1px solid rgba(0,255,200,0.08);border-radius:8px;padding:8px 12px;cursor:pointer;transition:all .3s;backdrop-filter:blur(12px);min-width:120px}
.zc:hover,.zc.on{border-color:#00ffc8;background:rgba(0,255,200,0.07);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,255,200,0.1)}
.zc .zn{font-family:'Orbitron';font-size:7.5px;font-weight:600;color:#00ffc8;letter-spacing:1px;text-transform:uppercase}
.zc .zd{font-size:9px;color:#6a8aaa;line-height:1.25;margin-top:2px}

.ctrls{position:absolute;top:50%;right:12px;transform:translateY(-50%);display:flex;flex-direction:column;gap:5px;pointer-events:auto;z-index:10}
.cb{width:34px;height:34px;border-radius:8px;background:rgba(5,10,25,0.85);border:1px solid rgba(0,255,200,0.15);color:#00ffc8;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;backdrop-filter:blur(10px);font-family:'Share Tech Mono'}
.cb:hover{background:rgba(0,255,200,0.12);border-color:#00ffc8;box-shadow:0 0 15px rgba(0,255,200,0.2)}

.leg{position:absolute;top:68px;left:16px;pointer-events:none;z-index:10;display:flex;flex-direction:column;gap:3px}
.li{display:flex;align-items:center;gap:6px;font-size:8px;color:#5a7a9a;letter-spacing:1.5px;text-transform:uppercase}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.tag{position:absolute;bottom:62px;right:16px;font-family:'Orbitron';font-size:6.5px;letter-spacing:2.5px;color:rgba(0,255,200,0.2);text-transform:uppercase;pointer-events:none;z-index:10;text-align:right;line-height:1.6}
</style>

// ═══ FLOOR ═══
function buildFloor(){

  // Floor grid
  const gm=new THREE.LineBasicMaterial({color:0x222840,transparent:true,opacity:.3});

    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(i,.01,-6),new THREE.Vector3(i,.01,6)]),gm));
  }
  for(let i=-6;i<=6;i++){
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-8,.01,i),new THREE.Vector3(8,.01,i)]),gm));
  }

  const gnd=new THREE.Mesh(
    new THREE.PlaneGeometry(60,60),

}

  // Front
  const fw=new THREE.Mesh(new THREE.BoxGeometry(16,wallH,.06),glassMat);
  fw.position.set(0,wallH/2,6);scene.add(fw);

    scene.add(new THREE.Mesh(new THREE.BoxGeometry(w,h,d),nm).translateX(x).translateY(y).translateZ(z));
  });

  // Corner posts (thin pillars)
  const pMat=new THREE.MeshStandardMaterial({color:0x2a3555,metalness:.6,roughness:.3});

// ═══ PERSON BUILDER ═══
const skins=[0xd4a574,0xc68642,0x8d5524,0xe0ac69,0xf1c27d,0xb07840,0xa0785a,0xddb892];
const shirts=[0x2563eb,0x059669,0xd97706,0x7c3aed,0xdc2626,0x0891b2,0xc026d3,0x4f46e5,0x15803d,0x0d9488,0xb45309,0x6d28d9];

function makePerson(x,z,type,seated,lookY=0){
  const g=new THREE.Group();
  const skin=skins[Math.floor(Math.random()*skins.length)];
  const shirt=type==='student'?shirts[Math.floor(Math.random()*shirts.length)]:type==='mentor'?0xee2266:0x8844ee;

    });

    // Forearms reaching to laptop
    [-.12,.12].forEach(s=>{
      const fa=new THREE.Mesh(new THREE.CylinderGeometry(.025,.022,.18,6),skinMat);
      fa.position.set(s,.48,-.16);fa.rotation.x=-1.1;g.add(fa);
    });

    // Hands on laptop
    [-.08,.08].forEach(s=>{
      const hand=new THREE.Mesh(new THREE.SphereGeometry(.022,8,8),skinMat);
      hand.position.set(s,.44,-.22);g.add(hand);
    });

    // Upper legs (horizontal on chair)
    [-.065,.065].forEach(s=>{
      const ul=new THREE.Mesh(new THREE.CylinderGeometry(.042,.038,.32,6),pantsMat);
      ul.position.set(s,.43,.08);ul.rotation.x=1.4;g.add(ul);
    });

    // Lower legs
    [-.065,.065].forEach(s=>{
      const ll=new THREE.Mesh(new THREE.CylinderGeometry(.035,.03,.32,6),pantsMat);
      ll.position.set(s,.22,.22);g.add(ll);
    });

    // Shoes
    [-.065,.065].forEach(s=>{
      const shoe=new THREE.Mesh(new THREE.BoxGeometry(.05,.03,.09),shoeMat);
      shoe.position.set(s,.04,.24);g.add(shoe);
    });

  } else {
    // === STANDING PERSON (mentor walking/helping) ===
    // Legs
    [-.06,.06].forEach(s=>{
      const leg=new THREE.Mesh(new THREE.CylinderGeometry(.038,.032,.48,6),pantsMat);
      leg.position.set(s,.24,0);leg.castShadow=true;g.add(leg);
    });
    // Shoes
    [-.06,.06].forEach(s=>{
      const shoe=new THREE.Mesh(new THREE.BoxGeometry(.05,.03,.1),shoeMat);
      shoe.position.set(s,.02,.02);g.add(shoe);
    });

    // Torso
    const torso=new THREE.Mesh(new THREE.BoxGeometry(.28,.36,.18),shirtMat);
    torso.position.y=.67;torso.castShadow=true;g.add(torso);

    // Neck
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(.04,.045,.06,8),skinMat).translateY(.87));

    // Head
    const head=new THREE.Mesh(new THREE.SphereGeometry(.09,14,14),skinMat);
    head.position.y=.97;head.castShadow=true;g.add(head);

    // Hair
    const hairMat=new THREE.MeshStandardMaterial({color:[0x1a1a1a,0x2c1a0e,0x0a0a0a][Math.floor(Math.random()*3)],roughness:.9});
    g.add(new THREE.Mesh(new THREE.SphereGeometry(.095,14,10,0,Math.PI*2,0,1.8),hairMat).translateY(.98));

    // Arms
    const isHelping=type==='mentor';

  bx.fillText(labels[type],32,33);
  const btex=new THREE.CanvasTexture(bc);
  const badge=new THREE.Mesh(new THREE.PlaneGeometry(.18,.18),new THREE.MeshBasicMaterial({map:btex,transparent:true,side:THREE.DoubleSide,depthWrite:false}));
  badge.position.y=bdgY;g.add(badge);

  const glow=new THREE.PointLight(colors[type],.04,.8);
  glow.position.y=.1;g.add(glow);

  g.position.set(x,0,z);g.rotation.y=lookY;
  scene.add(g);ppl.push(g);
  return g;
}

      new THREE.MeshStandardMaterial({color:[0x40c4ff,0x00e676,0xffab40,0xff6b9d,0x7c4dff][i],emissive:[0x40c4ff,0x00e676,0xffab40,0xff6b9d,0x7c4dff][i],emissiveIntensity:.2,transparent:true,opacity:.75})
    );
    card.position.set(-2.6+i*1.3,1.05,-5.88);scene.add(card);
    // Card label
    const lbl=makeCanvasLabel(nm,[0x40c4ff,0x00e676,0xffab40,0xff6b9d,0x7c4dff][i],.7);
    lbl.position.set(-2.6+i*1.3,1.05,-5.85);scene.add(lbl);
  });

  // Board title
  const bt=makeCanvasLabel('🔴 LIVE COLLABORATION BOARD',0xff4081,1.3);
  bt.position.set(0,1.95,-5.88);scene.add(bt);

  // Sprint retro / M&A debate tabs
  const t1=makeCanvasLabel('● Sprint Retro',0x00e676,.5);t1.position.set(-1.8,1.65,-5.87);scene.add(t1);
  const t2=makeCanvasLabel('⚡ M&A Debate',0xffab40,.5);t2.position.set(1.8,1.65,-5.87);scene.add(t2);

  // ── KANBAN BOARD (standup zone, left wall) ──
  const kb=new THREE.Mesh(new THREE.BoxGeometry(.06,1.5,2.4),new THREE.MeshStandardMaterial({color:0x0a1228,emissive:0x001520,emissiveIntensity:.2,metalness:.8}));
  kb.position.set(-7.92,.85,-3.5);scene.add(kb);

  // Kanban columns
  ['Back','Sprint','Done'].forEach((col,i)=>{
    const ch=new THREE.Mesh(new THREE.BoxGeometry(.015,.12,.65),new THREE.MeshBasicMaterial({color:[0xff4081,0xffab40,0x00e676][i]}));
    ch.position.set(-7.9,1.5,-4.3+i*.8);scene.add(ch);
  });
  // Sticky notes
  for(let c=0;c<3;c++) for(let r=0;r<3;r++){
    if(c===2&&r>1) continue;
    const s=new THREE.Mesh(new THREE.BoxGeometry(.008,.18,.22),new THREE.MeshStandardMaterial({color:[0xff4081,0xffab40,0x00e676][c],emissive:[0xff4081,0xffab40,0x00e676][c],emissiveIntensity:.12}));
    s.position.set(-7.9,1.2-r*.25,-4.3+c*.8);scene.add(s);
  }
  const kbTitle=makeCanvasLabel('KANBAN',0x40c4ff,.4);
  kbTitle.position.set(-7.88,1.7,-3.5);kbTitle.rotation.y=Math.PI/2;scene.add(kbTitle);
}

function makeCanvasLabel(text,color,scale=1){
  const cv=document.createElement('canvas');cv.width=1024;cv.height=128;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#'+color.toString(16).padStart(6,'0');
  ctx.font='bold 34px Orbitron,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,512,64);
  const tex=new THREE.CanvasTexture(cv);
  return new THREE.Mesh(new THREE.PlaneGeometry(scale*4.5,scale*.55),new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide,depthWrite:false}));
}

function makeCanvasLogo(){
  const cv=document.createElement('canvas');cv.width=1024;cv.height=256;
  const ctx=cv.getContext('2d');
  // Glow
  ctx.shadowColor='#00ffc8';ctx.shadowBlur=40;
  ctx.fillStyle='#00ffc8';ctx.font='bold 80px Orbitron,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('UPSKILLIZE',512,128);
  // Second pass sharper
  ctx.shadowBlur=0;ctx.fillText('UPSKILLIZE',512,128);
  const tex=new THREE.CanvasTexture(cv);
  return new THREE.Mesh(new THREE.PlaneGeometry(5,1.2),new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide,depthWrite:false}));
}

// ═══ ZONE UI ═══
function buildUI(){
  const p=document.getElementById('zp');
  ZONES.forEach((z,i)=>{
    const c=document.createElement('div');c.className='zc';
    c.innerHTML=`<div class="zn">${z.name}</div><div class="zd">${z.desc}</div>`;
    c.onclick=()=>focusZ(i);p.appendChild(c);
  });
}
function focusZ(i){
  const z=ZONES[i];
  tA=Math.atan2(z.x+.1,z.z+7)+Math.PI;tD=10;tE=.4;autoRotate=false;
  document.querySelectorAll('.zc').forEach((c,j)=>c.classList.toggle('on',j===i));
  zoneMeshes.forEach((m,j)=>{m.material.opacity=j===i?.18:.06;m.material.emissiveIntensity=j===i?.12:.04;});
}

// ═══ CAMERA ═══
function updateCam(){
  camera.position.set(
    Math.sin(camA)*Math.cos(camE)*camD,
    Math.max(Math.sin(camE)*camD,1.2),
    Math.cos(camA)*Math.cos(camE)*camD
  );
  camera.lookAt(0,.6,0);
}
function resetCam(){tA=.5;tE=.5;tD=18;autoRotate=true;
  document.querySelectorAll('.zc').forEach(c=>c.classList.remove('on'));
  zoneMeshes.forEach(m=>{m.material.opacity=.06;m.material.emissiveIntensity=.04;});
}
function topV(){tA=0;tE=1.45;tD=14;autoRotate=false;}
function walkV(){tA=.3;tE=.12;tD=10;autoRotate=false;}
function toggleRot(){autoRotate=!autoRotate;}

function setupControls(){
  const cv=renderer.domElement;
  cv.addEventListener('mousedown',e=>{isDrag=true;autoRotate=false;prev={x:e.clientX,y:e.clientY};});
  cv.addEventListener('mousemove',e=>{if(!isDrag)return;tA-=(e.clientX-prev.x)*.005;tE=Math.max(.05,Math.min(1.5,tE+(e.clientY-prev.y)*.005));prev={x:e.clientX,y:e.clientY};});
  cv.addEventListener('mouseup',()=>isDrag=false);
  cv.addEventListener('mouseleave',()=>isDrag=false);
  cv.addEventListener('wheel',e=>{e.preventDefault();tD=Math.max(5,Math.min(35,tD+e.deltaY*.02));},{passive:false});
  let lTD=0;
  cv.addEventListener('touchstart',e=>{if(e.touches.length===1){isDrag=true;autoRotate=false;prev={x:e.touches[0].clientX,y:e.touches[0].clientY};}else if(e.touches.length===2){lTD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}});
  cv.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&isDrag){tA-=(e.touches[0].clientX-prev.x)*.005;tE=Math.max(.05,Math.min(1.5,tE+(e.touches[0].clientY-prev.y)*.005));prev={x:e.touches[0].clientX,y:e.touches[0].clientY};}else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);tD=Math.max(5,Math.min(35,tD-(d-lTD)*.05));lTD=d;}},{passive:false});
  cv.addEventListener('touchend',()=>isDrag=false);
  window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
}

// ═══ ANIMATE ═══
function animate(){
  requestAnimationFrame(animate);
  t+=.008;

  if(autoRotate) tA+=.0012;
  camA+=(tA-camA)*.04;camE+=(tE-camE)*.04;camD+=(tD-camD)*.04;
  updateCam();

  // People idle animation (breathing + badge face camera)
  ppl.forEach((p,i)=>{
    const breathe=Math.sin(t*1.8+i*.6)*.003;
    p.children.forEach(ch=>{if(ch.position&&ch.position.y>.4) ch.position.y+=breathe;});
    // Last child = badge, make it face camera
    const badge=p.children[p.children.length-2]; // badge is second to last (glow is last)
    if(badge&&badge.material&&badge.material.map) badge.lookAt(camera.position);
  });

  // Mentors walking back and forth (observing students)
  mentorGroups.forEach(mg=>{
    const offset=Math.sin(t*mg.speed)*mg.rangeX;
    mg.mesh.position.x=mg.baseX+offset;
    // Slight body turn towards walking direction
    mg.mesh.rotation.y=Math.PI+Math.cos(t*mg.speed)*.15;
  });

  // Laptop screen flicker
  screens.forEach((s,i)=>{s.material.emissiveIntensity=.5+Math.sin(t*3+i*1.5)*.2;});

  // Zone pulse
  zoneMeshes.forEach((m,i)=>{if(m.material.opacity<.12)m.material.emissiveIntensity=.03+Math.sin(t*2+i)*.015;});

  renderer.render(scene,camera);
}

init();
</script>
